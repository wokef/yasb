watch_stylesheet: true
watch_config: true
debug: false
update_check: true
bars:
  primary-bar:
    enabled: true
    screens: ['*']
    class_name: 'yasb-bar'
    alignment:
      position: 'top'
      center: false
    animation:
      enabled: false
      duration: 400
    blur_effect:
      enabled: false
      acrylic: false
      dark_mode: false
      round_corners: false
      round_corners_type: 'normal'
      border_color: 'system'
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: '100%'
      height: 48
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
        - 'windows_desktops'
        - 'active_window'
      center:
        - 'notifications'
        - 'clock'
        - 'media'
      right:
        - 'apps'
        - 'bin'
        - 'microphone'
        - 'volume'
        - 'bluetooth'
        - 'wifi'
        - 'battery'
        - 'language'
        - 'power_menu'
widgets:
  home:
    type: 'yasb.home.HomeWidget'
    options:
      label: '<span>󰂩 </span>'
      offset_left: 2
      system_menu: true
      power_menu: true
      blur: false
  media:
    type: 'yasb.media.MediaWidget'
    options:
      label: '{artist}{s}{title}'
      separator: '  '
      max_field_size:
        label: 200
      show_thumbnail: true
      controls_only: false
      controls_left: true
      controls_hide: true
      hide_empty: true
      thumbnail_alpha: 100
      thumbnail_padding: 16
      thumbnail_corner_radius: 0
      thumbnail_edge_fade: true
      callbacks:
        on_left: 'toggle_media_menu'
        on_middle: 'do_nothing'
        on_right: 'do_nothing'
  active_window:
    type: 'yasb.active_window.ActiveWindowWidget'
    options:
      label: '{win[title]}'
      label_alt: "[class_name='{win[class_name]}' exe='{win[process][name]}' hwnd={win[hwnd]}]"
      label_icon: true
      label_icon_size: 16
      max_length: 60
      max_length_ellipsis: '...'
      monitor_exclusive: true
  clock:
    type: 'yasb.clock.ClockWidget'
    options:
      label: '{%a, %d | %H:%M}'
      label_alt: '{%a, %d | %H:%M:%S}'
      locale: 'it'
      update_interval: 1000
      calendar:
        blur: false
        round_corners: false
        alignment: 'center'
        direction: 'down'
      callbacks:
        on_right: 'toggle_label'
        on_left: 'do_nothing'
  volume:
    type: 'yasb.volume.VolumeWidget'
    options:
      label: '<span>{icon}</span>'
      label_alt: '<span class="icon pdr">{icon}</span> {level}'
      tooltip: true
      volume_icons:
        - ' '
        - ' '
        - ' '
        - ' '
        - ' '
      callbacks:
        on_left: 'toggle_mute'
        on_middle: 'exec cmd.exe /c start ms-settings:sound'
        on_right: 'toggle_volume_menu'
  microphone:
    type: 'yasb.microphone.MicrophoneWidget'
    options:
      label: '<span>{icon}</span>'
      label_alt: '<span>{icon}</span>'
      icons:
        normal: '󰍬'
        muted: '󰍭'
      callbacks:
        on_left: 'toggle_mute'
        on_middle: 'exec cmd.exe /c start ms-settings:sound'
        on_right: 'toggle_mic_menu'
  power_menu:
    type: 'yasb.power_menu.PowerMenuWidget'
    options:
      label: '󰤆'
      uptime: true
      show_user: true
      blur: false
      blur_background: true
      animation_duration: 60
      button_row: 3
      buttons:
        restart: ['󰑐', 'Restart']
        shutdown: ['󰤆', 'Shut Down']
        signout: ['󰍃', 'Sign out']
        hibernate: ['', 'Hibernate']
        lock: ['', 'Lock']
        cancel: ['󰜺', 'Cancel']
  notifications:
    type: 'yasb.notifications.NotificationsWidget'
    options:
      label: '<span> </span>{count}'
      label_alt: '<span> </span>{count} notifications'
      hide_empty: true
      tooltip: true
      callbacks:
        on_left: 'toggle_notification'
        on_middle: 'do_nothing'
        on_right: 'toggle_label'
  windows_desktops:
    type: yasb.windows_desktops.WorkspaceWidget
    options:
      label_workspace_btn: '{index}'
      label_workspace_active_btn: '{index}'
      btn_shadow:
        enabled: false
      callbacks:
        on_left: 'activate_workspace'
        on_middle: 'do_nothing'
        on_right: 'toggle_context_menu'
  battery:
    type: yasb.battery.BatteryWidget
    options:
      label: '<span>{icon}</span>{percent}'
      label_alt: '<span>{icon}</span>{percent} | {power} | {time_remaining}'
      callbacks:
        on_left: 'do_nothing'
        on_right: 'toggle_label'
    charging_options:
      icon_format: '{charging_icon}'
      blink_charging_icon: true
      blink_interval: 500
  wifi:
    type: yasb.wifi.WifiWidget
    options:
      label: '<span class="icon pdr">{wifi_icon}</span>{wifi_name} {wifi_strength}%'
      label_alt: '<span>{wifi_icon}</span>'
      ethernet_label: '<span>{wifi_icon}</span>'
      ethernet_label_alt: '<span class="icon pdr">{wifi_icon}</span>{ip_addr}'
      wifi_icons:
        - '󰤯 '
        - '󰤟 '
        - '󰤢 '
        - '󰤥 '
        - '󰤨 '
      callbacks:
        on_left: 'exec cmd.exe /c start ms-settings:network-wifi'
        on_right: 'toggle_label'
  bluetooth:
    type: yasb.bluetooth.BluetoothWidget
    options:
      label: '<span>{icon}</span>'
      label_alt: '<span class="icon pdr">{icon}</span>{device_name}'
      label_no_device: 'No device'
      icons:
        bluetooth_on: ''
        bluetooth_off: '󰂲'
        bluetooth_connected: '󰂱'
      callbacks:
        on_left: 'exec cmd.exe /c start ms-settings:bluetooth'
        on_right: 'toggle_label'
  language:
    type: yasb.language.LanguageWidget
    options:
      update_interval: 1
      label: '{lang[layout_name]}'
      label_alt: '{lang[layout_name]}'
      callbacks:
        on_left: 'exec cmd.exe /c start ms-settings:regionlanguage'
        on_right: 'do_nothing'
  bin:
    type: 'yasb.recycle_bin.RecycleBinWidget'
    options:
      label: '<span>{icon}</span>'
      label_alt: '<span class="icon pdr">{icon}</span> Items {items_count}, Total size ({items_size})'
      icons:
        bin_empty: ''
        bin_filled: ''
      callbacks:
        on_left: 'open_bin'
        on_right: 'toggle_label'
        on_middle: 'empty_bin'
      show_confirmation: true
      label_shadow:
        enabled: true
        color: 'black'
        radius: 3
        offset: [1, 1]
  taskbar:
    type: 'yasb.taskbar.TaskbarWidget'
    options:
      icon_size: 16
      tooltip: false
      show_only_visible: true
      strict_filtering: true
      monitor_exclusive: false
      hide_empty: true
      animation:
        enabled: false
      preview:
        enabled: true
        width: 240
        delay: 400
        padding: 8
        margin: 8
      title_label:
        enabled: false
  apps:
    type: 'yasb.applications.ApplicationsWidget'
    options:
      label: '{data}'
      app_list:
        - {
            icon: '',
            launch: 'start %windir%\explorer.exe "$env:WSL_HOME_PATH"',
            name: 'WSL ~',
          }
